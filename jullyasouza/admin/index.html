<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Jullya Souza Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <link rel="stylesheet" href="../index.css">
    <style>
        .admin-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }
        .filter-btn.active {
            background: #0B1320;
            color: white;
            border-color: #0B1320;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">
    <!-- LOGIN OVERLAY -->
    <div id="login-overlay" class="fixed inset-0 z-[100] bg-[#0B1320] flex items-center justify-center p-6 transition-opacity duration-500">
        <div class="w-full max-w-sm text-center bg-[#0B1320] p-10 rounded-[40px] border border-white/10 shadow-2xl">
            <img src="../images/logo-jullyasouza.png" class="h-24 mx-auto mb-8 object-contain">
            <h1 class="text-xl font-serif text-rose-gold mb-8 italic">Acesso Restrito</h1>
            <input type="password" id="admin-pass" onkeyup="if(event.key==='Enter') checkAuth()" placeholder="Senha de Acesso" class="w-full bg-[#151f2e] border border-white/20 rounded-2xl px-6 py-5 mb-6 text-center focus:border-rose-gold outline-none transition-all text-white placeholder-zinc-500 font-bold">
            <button onclick="checkAuth()" class="w-full py-5 bg-rose-gold text-[#0B1320] rounded-2xl font-black uppercase tracking-widest text-xs hover:brightness-110 active:scale-95 transition-all shadow-xl">
                Entrar no Painel
            </button>
            <p id="login-error" class="text-rose-500 text-[10px] mt-4 uppercase font-bold tracking-widest hidden">Senha incorreta</p>
        </div>
    </div>

    <!-- MAIN ADMIN PANEL -->
    <div id="admin-panel" class="hidden opacity-0 transition-opacity duration-1000 max-w-5xl mx-auto p-4 md:p-10">
        <header class="flex flex-row items-center justify-between gap-4 mb-8 border-b border-slate-200 pb-8 font-bold">
            <div>
                <span class="text-[10px] md:text-[11px] text-zinc-400 uppercase tracking-[0.4em] mb-1 block">Gestão</span>
                <h2 class="text-xl md:text-3xl font-serif text-[#0B1320] italic">Olá, Jullya!</h2>
            </div>
            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="openAddModal()" class="px-4 py-3 md:px-6 md:py-3 bg-[#0B1320] text-white rounded-xl text-[9px] md:text-[10px] uppercase font-black tracking-widest hover:scale-105 transition-all text-center">
                    + Novo
                </button>
                <button onclick="saveChanges()" id="btn-save" class="px-4 py-3 md:px-6 md:py-3 bg-green-600 text-white rounded-xl text-[9px] md:text-[10px] uppercase font-black tracking-widest hover:scale-105 transition-all hidden text-center">
                    Salvar
                </button>
                <div class="h-8 w-px bg-slate-200 mx-1"></div>
                <button onclick="logout()" class="text-[10px] text-zinc-400 hover:text-rose-500 uppercase font-black tracking-widest transition-all px-2">
                    SAIR
                </button>
            </div>
        </header>

        <!-- FILTROS -->
        <div class="mb-8">
            <!-- Mobile Select -->
            <div class="md:hidden relative">
                <select id="brand-select-mobile" onchange="filterBrand(this.value)" class="w-full bg-white border border-slate-200 rounded-2xl px-6 py-4 text-[11px] font-black uppercase tracking-widest text-[#0B1320] appearance-none outline-none shadow-sm">
                    <option value="all">Filtro: Todas as Marcas</option>
                    <option value="eudora">Eudora</option>
                    <option value="boticario">Boticário</option>
                    <option value="oui">O.U.I Paris</option>
                    <option value="qdb">Quem Disse, Berenice?</option>
                </select>
                <div class="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-zinc-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
            </div>

            <!-- Desktop Buttons -->
            <div class="hidden md:flex gap-3 overflow-x-auto pb-4 no-scrollbar scroll-smooth">
                <button onclick="filterBrand('all')" class="filter-btn active px-7 py-3 rounded-full border border-slate-200 text-slate-500 text-[11px] uppercase font-black tracking-widest hover:border-[#0B1320] transition-all whitespace-nowrap">Todas</button>
                <button onclick="filterBrand('eudora')" class="filter-btn px-7 py-3 rounded-full border border-slate-200 text-slate-500 text-[11px] uppercase font-black tracking-widest hover:border-[#0B1320] transition-all whitespace-nowrap">Eudora</button>
                <button onclick="filterBrand('boticario')" class="filter-btn px-7 py-3 rounded-full border border-slate-200 text-slate-500 text-[11px] uppercase font-black tracking-widest hover:border-[#0B1320] transition-all whitespace-nowrap">Boticário</button>
                <button onclick="filterBrand('oui')" class="filter-btn px-7 py-3 rounded-full border border-slate-200 text-slate-500 text-[11px] uppercase font-black tracking-widest hover:border-[#0B1320] transition-all whitespace-nowrap">O.U.I</button>
                <button onclick="filterBrand('qdb')" class="filter-btn px-7 py-3 rounded-full border border-slate-200 text-slate-500 text-[11px] uppercase font-black tracking-widest hover:border-[#0B1320] transition-all whitespace-nowrap">QDB</button>
            </div>
        </div>

        <!-- LISTA DE PRODUTOS -->
        <div id="admin-product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Gerado via JS -->
        </div>
    </div>

    <!-- MODAL ADD/EDIT -->
    <div id="product-modal" class="fixed inset-0 z-[110] bg-[#0B1320]/90 backdrop-blur-md flex items-center justify-center p-4 md:p-6 hidden">
        <div class="w-full max-w-lg bg-white rounded-[40px] p-6 md:p-10 text-[#0B1320] relative max-h-[95vh] flex flex-col shadow-2xl">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-zinc-400 hover:text-rose-gold z-20">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
            
            <h2 id="modal-title" class="text-2xl font-serif mb-6 italic sticky top-0 bg-white pb-2 z-10">Adicionar Produto</h2>
            
            <form id="product-form" class="space-y-4 overflow-y-auto pr-2 custom-scrollbar">
                <input type="hidden" id="field-id">
                
                <div>
                    <label class="text-[9px] uppercase font-black tracking-widest text-zinc-400 mb-2 block">Nome do Produto</label>
                    <input type="text" id="field-name" required class="w-full bg-zinc-50 border border-zinc-100 rounded-2xl px-5 py-3 outline-none focus:border-rose-gold transition-all text-sm">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] uppercase font-black tracking-widest text-zinc-400 mb-2 block">Preço Real (Sem Desconto)</label>
                        <input type="number" step="0.01" id="field-oldPrice" class="w-full bg-zinc-50 border border-zinc-100 rounded-2xl px-5 py-3 outline-none focus:border-rose-gold transition-all text-sm">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase font-black tracking-widest text-zinc-400 mb-2 block">Preço de Oferta (R$)</label>
                        <input type="number" step="0.01" id="field-price" required class="w-full bg-zinc-50 border border-zinc-100 rounded-2xl px-5 py-3 outline-none focus:border-rose-gold transition-all text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[9px] uppercase font-black tracking-widest text-zinc-400 mb-2 block">Foto do Produto</label>
                        <div id="image-upload-zone" class="relative h-28 bg-zinc-50 border-2 border-dashed border-zinc-200 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:border-rose-gold transition-all overflow-hidden group">
                            <input type="file" id="field-file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                            <div id="upload-placeholder" class="text-center">
                                <svg class="w-5 h-5 mx-auto text-zinc-300 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
                                <span class="text-[8px] uppercase font-bold text-zinc-400">Trocar Foto</span>
                            </div>
                            <img id="image-preview" class="hidden absolute inset-0 w-full h-full object-contain p-2 bg-white">
                        </div>
                    </div>
                    <div class="space-y-3">
                        <div>
                            <label class="text-[9px] uppercase font-black tracking-widest text-zinc-400 mb-2 block">Marca</label>
                            <select id="field-brand" class="w-full bg-zinc-50 border border-zinc-100 rounded-2xl px-5 py-3 outline-none focus:border-rose-gold transition-all text-sm">
                                <option value="eudora">Eudora</option>
                                <option value="boticario">Boticário</option>
                                <option value="oui">O.U.I</option>
                                <option value="qdb">QDB</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[9px] uppercase font-black tracking-widest text-zinc-400 mb-2 block">Nome do Arquivo</label>
                            <input type="text" id="field-image" placeholder="Ex: perfume-diva" required class="w-full bg-zinc-50 border border-zinc-100 rounded-2xl px-5 py-3 outline-none focus:border-rose-gold transition-all text-[10px]">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="text-[9px] uppercase font-black tracking-widest text-zinc-400 mb-2 block">Descrição</label>
                    <textarea id="field-desc" class="w-full bg-zinc-50 border border-zinc-100 rounded-2xl px-5 py-3 outline-none focus:border-rose-gold transition-all resize-none h-20 text-xs"></textarea>
                </div>
                
                <button type="submit" class="w-full py-5 bg-[#0B1320] text-white rounded-2xl text-[12px] uppercase font-black tracking-[0.2em] shadow-xl hover:brightness-110 active:scale-95 transition-all sticky bottom-0">
                    Salvar Produto
                </button>
            </form>
        </div>
    </div>
    
    <!-- MODAL DE CONFIRMAÇÃO DE EXCLUSÃO -->
    <div id="delete-modal" class="fixed inset-0 z-[120] bg-[#0B1320]/90 backdrop-blur-md flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm bg-white rounded-[40px] p-10 text-[#0B1320] text-center shadow-2xl">
            <div class="w-20 h-20 bg-rose-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <h3 class="text-xl font-serif mb-2 italic">Excluir Produto?</h3>
            <p class="text-xs text-zinc-500 leading-relaxed mb-10">Esta ação não pode ser desfeita. O produto será removido permanentemente do seu catálogo.</p>
            
            <div class="flex flex-col gap-3">
                <button id="confirm-delete-btn" class="w-full py-5 bg-rose-500 text-white rounded-2xl text-[12px] uppercase font-black tracking-widest hover:brightness-110 transition-all">
                    Sim, Excluir permanentemente
                </button>
                <button onclick="closeDeleteModal()" class="w-full py-5 bg-zinc-100 text-zinc-400 rounded-2xl text-[12px] uppercase font-black tracking-widest hover:bg-zinc-200 transition-all">
                    Cancelar
                </button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
