            background-size: 50px 50px;

        .timeline-dot {

        .reveal-element.active .timeline-dot {
            background-color: #3b82f6 !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06) !important;

        }

        .clean-card:hover {
            border-color: rgba(59, 130, 246, 0.4);

        .progress-track {

            background: #cbd5e1;

        .progress-fill {

            border-radius: 999px;
            will-change: height;
        }

        /* Estilos do Carrossel (Swiper Customizado) */
        .swiper {
            width: 100%;
            padding: 1rem 0 4rem 0 !important;
            overflow: visible !important;
        }

        .swiper-slide {
            width: auto !important;
        }

        #projects-section .swiper-wrapper {
            transition-timing-function: ease-out;
        }

        .carousel-item {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 340px;
            background: white;
            padding: 1rem;
            border-radius: 2rem;
            border: 1px solid #f1f5f9;
            transition: all 0.3s ease;
            height: auto;
            cursor: grab;
        }

        .carousel-item:active {
            cursor: grabbing;
        }

        @media (min-width: 768px) {
            .carousel-item {
                width: 320px;
                padding: 0;
                background: transparent;
                border: none;

            .carousel-item:hover {

        .project-img-container {
            aspect-ratio: 16/10;
            overflow: hidden;
            border-radius: 1.5rem;
            position: relative;
        }

        .project-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;

        .carousel-item:hover .project-img-container img {

        .day-label {

<body class="font-sans antialiased text-slate-600 selection:bg-brand-500 selection:text-white">

                    class="w-14 h-14 rounded-2xl bg-gradient-to-br from-brand-500 to-blue-600 flex items-center justify-center text-white font-black text-2xl shadow-lg shadow-brand-500/20">

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!-- ==================== SCRIPTS ==================== -->
    <script>


        document.addEventListener('DOMContentLoaded', () => {
            const totalDays = 30;
            const carouselTrack = document.getElementById('carousel-track');

            const getStatusData = (dayIndex) => {
                const projects = {
                    1: { title: 'Igreja Fortalecendo Vidas', link: 'https://desafio-1vx.pages.dev/ifv/' },
                    2: { title: 'Cardoso Cosméticos', link: 'https://desafio-1vx.pages.dev/cardosocosmeticos/' },
                    3: { title: 'JCB Advogados', link: 'https://desafio-1vx.pages.dev/jcb-adv/' },
                    4: { title: 'Leonardo Almeida Imóveis', link: 'https://aldeiabeachclube.com.br/' },
                    5: { title: 'Estamparia IDE', link: 'https://desafio-1vx.pages.dev/estampariaide/' },
                    6: { title: 'Nicole Araújo Arq', link: 'https://desafio-1vx.pages.dev/nicolearaujoarq/' },
                    7: { title: 'SETE Segurança', link: 'https://setemonitoramento.com.br/' },
                    8: { title: 'Luciana Carvalho Moda', link: 'https://desafio-1vx.pages.dev/lucianacarvalho/' },
                    9: { title: 'Oliver Confeitaria', link: 'https://desafio-1vx.pages.dev/oliverconfeitaria/' },
                    10: { title: 'Jullya Souza Beauty', link: 'https://desafio-1vx.pages.dev/jullyasouza/' },
                    11: { title: 'Origem Camisas', link: 'https://desafio-1vx.pages.dev/origem/' },
                    12: { title: 'BonGoût Pimentas', link: 'https://desafio-1vx.pages.dev/bongout/' },
                    13: { title: 'IPFV Colatina', link: 'https://desafio-1vx.pages.dev/ipfvcolatina/' },
                    14: { title: 'Doces da Mel', link: 'https://desafio-1vx.pages.dev/docesdamel/' },
                    15: { title: 'Apartamento 302 Guarapari', link: 'https://desafio-1vx.pages.dev/ape302guarapari/' },
                    16: { title: 'DL Artesanato', link: 'https://desafio-1vx.pages.dev/dlartesanato/' },
                    17: { title: 'Hope Team Boxe', link: 'https://desafio-1vx.pages.dev/hopeteamguarapari/' },
                    18: { title: 'Tectronik', link: 'https://desafio-1vx.pages.dev/tectronik/' },
                    19: { title: 'Mai Doces', link: 'https://desafio-1vx.pages.dev/maidoces/' },
                    20: { title: 'Vórtice Multimarcas', link: 'https://desafio-1vx.pages.dev/vortice/' },
                    21: { title: 'Casa de Hóspedes Vale da Estação', link: 'https://desafio-1vx.pages.dev/valedaestacao/' },
                    22: { title: 'Studio Mary Marinho', link: 'https://desafio-1vx.pages.dev/studiomarymarinho/' },
                    23: { title: 'Sil Almeida Store', link: 'https://desafio-1vx.pages.dev/silalmeidastore/' },
                    24: { title: 'GL Acessórios Finos', link: 'https://desafio-1vx.pages.dev/glacessoriosfinos/' },
                    25: { title: 'Luciana Bolos', link: 'https://desafio-1vx.pages.dev/lucianabolos/' },
                    26: { title: 'Auto Escola Rodovia do Sol', link: 'https://desafio-1vx.pages.dev/autoescolarodoviadosol/' },
                    27: { title: 'Espaço RW | Ediene Santana', link: 'https://desafio-1vx.pages.dev/espacorw/' },
                    28: { title: 'Garden Moda & Acessórios', link: 'https://desafio-1vx.pages.dev/garden/' },
                    29: { title: 'Hélia Alcântara', link: 'https://desafio-1vx.pages.dev/heliaalcantara/' },
                };

                if (projects[dayIndex]) {
                    return {
                        status: 'concluido',
                        title: projects[dayIndex].title,
                        text: 'Ver Projeto',
                        badge: 'bg-brand-50 text-brand-600 border border-brand-100',
                        linkText: 'text-brand-600 hover:text-brand-700',
                        link: projects[dayIndex].link,
                        thumb: `miniaturas/dia${String(dayIndex).padStart(2, '0')}.webp`
                    };
                }
                return null;
            };

            // Popular Carrossel
            let carouselHTML = '';
            let lastCompleted = 1;

            // Primeiro, identificar o último concluído para o Hero
            for (let i = 1; i <= totalDays; i++) {
                if (getStatusData(i)) lastCompleted = i;
            }

            // Depois, gerar o carrossel na ordem inversa (do mais novo para o mais antigo)
            for (let i = totalDays; i >= 1; i--) {
                const data = getStatusData(i);
                if (data) {
                    const dayString = String(i).padStart(2, '0');
                    carouselHTML += `
                        <div class="swiper-slide flex justify-center">
                            <a href="${data.link}" target="_blank" class="carousel-item group">
                                <div class="project-img-container shadow-lg group-hover:shadow-xl transition-shadow">
                                    <span class="day-label">Dia ${dayString}</span>
                                    <picture>
                                        <source srcset="miniaturas/dia${dayString}.avif" type="image/avif">
                                        <source srcset="miniaturas/dia${dayString}.webp" type="image/webp">
                                        <img src="${data.thumb}" alt="${data.title}" 
                                             onerror="this.src='https://placehold.co/600x400/eff6ff/3b82f6?text=Dia+${dayString}'">
                                    </picture>
                                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-6">
                                        <span class="text-white font-bold text-sm flex items-center gap-2">
                                            Explorar Site <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                                        </span>
                                    </div>
                                </div>
                                <div class="mt-4 px-1 text-center md:text-left">
                                    <h3 class="text-slate-900 font-bold group-hover:text-brand-600 transition-colors line-clamp-1">${data.title}</h3>
                                    <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mt-1">Concluído</p>
                                </div>
                            </a>
                        </div>
                    `;
                }
            }

            // Card Final de CTA: Sugestão Instagram (Limpo)
            carouselHTML += `
                <div class="swiper-slide flex justify-center">
                    <a href="https://www.instagram.com/p/DWhKoJpqWZR/" target="_blank" class="carousel-item cta-card group">
                        <div class="flex flex-col items-center justify-center p-6 text-center">
                            <div class="w-20 h-20 rounded-3xl bg-gradient-to-tr from-[#f09433] via-[#e6683c] to-[#bc1888] flex items-center justify-center text-white mb-6 shadow-glow transition-transform group-hover:scale-110">
                                <i class="fa-brands fa-instagram text-4xl"></i>
                            </div>
                            <h3 class="text-slate-900 font-extrabold text-2xl leading-tight">O próximo pode<br>ser o seu!</h3>
                            <p class="text-slate-500 font-medium mt-3 max-w-[280px] mx-auto leading-relaxed">Comente marcando o seu @ ou o @ de um conhecido que gostaria de ter um site.</p>
                            <div class="mt-8 flex items-center gap-2 text-brand-600 font-bold text-sm uppercase tracking-widest group-hover:gap-4 transition-all">
                                Comentar lá <i class="fa-solid fa-arrow-right"></i>
                            </div>
                        </div>
                    </a>
                </div>
            `;

            carouselTrack.innerHTML = carouselHTML;

            // Inicializar Swiper
            const swiper = new Swiper('.projects-swiper', {
                slidesPerView: 'auto',
                spaceBetween: 32,
                grabCursor: true,
                mousewheel: {
                    forceToAxis: true,
                },
                breakpoints: {
                    // Mobile (Default)
                    0: {
                        direction: 'vertical',
                        slidesPerView: 'auto',
                        autoHeight: true,
                    },
                    // Desktop (md)
                    768: {
                        direction: 'horizontal',
                        slidesPerView: 'auto',
                        freeMode: true,
                    }
                }
            });

            // Hero Call-to-Action: Último Projeto
            const lastData = getStatusData(lastCompleted);
            const latestCtaEl = document.getElementById('latest-project-cta');

            if (lastData) {
                latestCtaEl.innerHTML = `
                    <div class="group relative">
                        <div class="absolute -inset-1 bg-gradient-to-r from-brand-400 to-blue-600 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
                        <a href="${lastData.link}" target="_blank" rel="noopener noreferrer" 
                           class="relative flex items-center gap-4 md:gap-6 bg-white border border-slate-200 p-4 md:px-8 md:py-5 rounded-2xl md:rounded-3xl hover:border-brand-500 transition-all shadow-premium group overflow-hidden">
                            <!-- Miniatura no Destaque -->
                            <div class="hidden sm:block w-20 h-20 md:w-24 md:h-24 rounded-2xl overflow-hidden border border-slate-100 flex-shrink-0">
                                <picture>
                                    <source srcset="miniaturas/dia${String(lastCompleted).padStart(2, '0')}.avif" type="image/avif">
                                    <source srcset="miniaturas/dia${String(lastCompleted).padStart(2, '0')}.webp" type="image/webp">
                                    <img src="${lastData.thumb}" alt="${lastData.title}" class="w-full h-full object-cover">
                                </picture>
                            </div>
                            
                            <div class="flex flex-col text-left">
                                <div class="flex flex-col mb-2">
                                    <div class="text-[10px] font-black uppercase tracking-[0.2em] text-brand-500 flex items-center gap-2">
                                        <span class="w-2 h-2 bg-brand-500 rounded-full animate-pulse"></span>
                                        Último Lançamento
                                    </div>
                                    <div class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 ml-4 mt-0.5">
                                        Dia ${String(lastCompleted).padStart(2, '0')}
                                    </div>
                                </div>
                                <h4 class="text-xl font-bold text-slate-900 group-hover:text-brand-600 transition-colors">${lastData.title}</h4>
                            </div>
                            <div class="w-12 h-12 rounded-xl bg-brand-50 flex items-center justify-center text-brand-600 group-hover:bg-brand-500 group-hover:text-white transition-all">
                                <i class="fa-solid fa-arrow-up-right-from-square"></i>
                            </div>
                        </a>
                    </div>
                `;

                // Animação de entrada
                setTimeout(() => {
                    latestCtaEl.classList.remove('opacity-0', 'translate-y-4');
                    latestCtaEl.classList.add('opacity-100', 'translate-y-0');
                }, 500);
            }
        });
    </script>
</body>

</html>
